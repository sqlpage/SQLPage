load_module modules/ngx_otel_module.so;

events {}

http {
    otel_exporter {
        endpoint otel-collector:4317;
    }

    otel_service_name nginx;

    log_format otel_combined 'ts=$time_iso8601 level=info target=nginx.access '
                             'client_ip=$remote_addr method=$request_method path="$uri" '
                             'status=$status request_time=$request_time '
                             'upstream_addr="$upstream_addr" upstream_status="$upstream_status" '
                             'upstream_response_time="$upstream_response_time" '
                             'referer="$http_referer" user_agent="$http_user_agent" '
                             'trace_id=$otel_trace_id span_id=$otel_span_id parent_id=$otel_parent_id';

    access_log /dev/stdout otel_combined;
    error_log /dev/stderr info;

    upstream sqlpage {
        server sqlpage:8080;
    }

    server {
        listen 80;

        location / {
            otel_trace on;
            otel_span_name "$request_method $uri";
            otel_trace_context propagate;
            proxy_pass http://sqlpage;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
