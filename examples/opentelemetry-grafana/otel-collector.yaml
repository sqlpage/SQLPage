receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  syslog/sqlpage:
    protocol: rfc5424
    udp:
      listen_address: 0.0.0.0:1514
  syslog/postgresql:
    protocol: rfc5424
    udp:
      listen_address: 0.0.0.0:1515
  postgresql:
    endpoint: postgres:5432
    transport: tcp
    username: sqlpage
    password: sqlpage
    tls:
      insecure: true
    databases:
      - sqlpage
    collection_interval: 1s

processors:
  transform/sqlpage_logs:
    error_mode: ignore
    log_statements:
      - context: resource
        statements:
          - set(resource.attributes["service.name"], "sqlpage")
      - context: log
        statements:
          - set(log.body, log.attributes["message"]) where log.attributes["message"] != nil
          - merge_maps(log.cache, ExtractPatterns(log.body, "level=(?P<level>[^ ]+)"), "upsert") where IsString(log.body)
          - merge_maps(log.cache, ExtractPatterns(log.body, "trace_id=(?P<trace_id>[0-9a-f]+)"), "upsert") where IsString(log.body)
          - set(log.attributes["level"], log.cache["level"]) where log.cache["level"] != nil
          - set(log.attributes["trace_id"], log.cache["trace_id"]) where log.cache["trace_id"] != nil
          - set(log.severity_text, "TRACE") where log.cache["level"] == "trace"
          - set(log.severity_number, SEVERITY_NUMBER_TRACE) where log.cache["level"] == "trace"
          - set(log.severity_text, "DEBUG") where log.cache["level"] == "debug"
          - set(log.severity_number, SEVERITY_NUMBER_DEBUG) where log.cache["level"] == "debug"
          - set(log.severity_text, "INFO") where log.cache["level"] == "info"
          - set(log.severity_number, SEVERITY_NUMBER_INFO) where log.cache["level"] == "info"
          - set(log.severity_text, "WARN") where log.cache["level"] == "warn"
          - set(log.severity_number, SEVERITY_NUMBER_WARN) where log.cache["level"] == "warn"
          - set(log.severity_text, "ERROR") where log.cache["level"] == "error"
          - set(log.severity_number, SEVERITY_NUMBER_ERROR) where log.cache["level"] == "error"
  transform/postgresql_logs:
    error_mode: ignore
    log_statements:
      - context: resource
        statements:
          - set(resource.attributes["service.name"], "postgresql")
      - context: log
        statements:
          - set(log.body, log.attributes["message"]) where log.attributes["message"] != nil
          - merge_maps(log.cache, ExtractPatterns(log.body, "app=\\[[^\\]]*00-(?P<trace_id>[0-9a-f]{32})-[0-9a-f]{16}-[0-9a-f]{2}\\]"), "upsert") where IsString(log.body)
          - merge_maps(log.cache, ExtractPatterns(log.body, "(?P<level>LOG|ERROR|WARNING|FATAL|PANIC|NOTICE|INFO|DEBUG):"), "upsert") where IsString(log.body)
          - set(log.attributes["trace_id"], log.cache["trace_id"]) where log.cache["trace_id"] != nil
          - set(log.attributes["level"], log.cache["level"]) where log.cache["level"] != nil
          - set(log.severity_text, "DEBUG") where log.cache["level"] == "DEBUG"
          - set(log.severity_number, SEVERITY_NUMBER_DEBUG) where log.cache["level"] == "DEBUG"
          - set(log.severity_text, "INFO") where log.cache["level"] == "LOG" or log.cache["level"] == "INFO" or log.cache["level"] == "NOTICE"
          - set(log.severity_number, SEVERITY_NUMBER_INFO) where log.cache["level"] == "LOG" or log.cache["level"] == "INFO" or log.cache["level"] == "NOTICE"
          - set(log.severity_text, "WARN") where log.cache["level"] == "WARNING"
          - set(log.severity_number, SEVERITY_NUMBER_WARN) where log.cache["level"] == "WARNING"
          - set(log.severity_text, "ERROR") where log.cache["level"] == "ERROR" or log.cache["level"] == "FATAL" or log.cache["level"] == "PANIC"
          - set(log.severity_number, SEVERITY_NUMBER_ERROR) where log.cache["level"] == "ERROR" or log.cache["level"] == "FATAL" or log.cache["level"] == "PANIC"
  batch:
    timeout: 1s

exporters:
  otlp_grpc/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  otlp_http/loki:
    endpoint: http://loki:3100/otlp
  prometheus:
    endpoint: 0.0.0.0:9464

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_grpc/tempo]
    metrics:
      receivers: [postgresql]
      processors: [batch]
      exporters: [prometheus]
    logs/sqlpage:
      receivers: [syslog/sqlpage]
      processors: [transform/sqlpage_logs, batch]
      exporters: [otlp_http/loki]
    logs/postgresql:
      receivers: [syslog/postgresql]
      processors: [transform/postgresql_logs, batch]
      exporters: [otlp_http/loki]
