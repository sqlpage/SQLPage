services:
  nginx:
    image: nginx:otel
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - sqlpage
      - otel-collector

  sqlpage:
    build:
      context: ../..
      dockerfile: examples/opentelemetry-grafana/Dockerfile
    environment:
      - DATABASE_URL=postgres://sqlpage:sqlpage@postgres:5432/sqlpage
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=sqlpage
    volumes:
      - ./website:/var/www
      - ./sqlpage:/etc/sqlpage
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: sqlpage
      POSTGRES_PASSWORD: sqlpage
      POSTGRES_DB: sqlpage
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sqlpage"]
      interval: 2s
      timeout: 5s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.6.1
    volumes:
      - ./tempo.yaml:/etc/tempo/config.yaml:ro
    command: ["-config.file=/etc/tempo/config.yaml"]

  loki:
    image: grafana/loki:3.4.1
    command: ["-config.file=/etc/loki/local-config.yaml"]

  promtail:
    image: grafana/promtail:3.4.1
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./promtail.yaml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/sqlpage/sqlpage-home.json
      - GF_NEWS_NEWS_FEED_ENABLED=false
    volumes:
      - ./grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./grafana/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./grafana:/etc/grafana/provisioning/dashboards/sqlpage:ro
    depends_on:
      - tempo
      - loki
