services:
  nginx:
    image: nginx:otel
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - sqlpage
      - otel-collector

  sqlpage:
    build:
      context: ../..
      args:
        CARGO_PROFILE: release
    environment:
      - DATABASE_URL=postgres://sqlpage:sqlpage@postgres:5432/sqlpage
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=sqlpage
    volumes:
      - ./website:/var/www
      - ./sqlpage:/etc/sqlpage
    depends_on:
      otel-collector:
        condition: service_started
      postgres:
        condition: service_healthy
    logging:
      driver: syslog
      options:
        syslog-address: "udp://localhost:1514"
        syslog-format: "rfc5424micro"
        tag: "sqlpage"

  postgres:
    image: postgres:16
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track_utility=off
      - -c
      - log_destination=stderr
      - -c
      - log_line_prefix=ts=%m pid=%p db=%d user=%u app=[%a] 
      - -c
      - log_min_duration_statement=25
    environment:
      POSTGRES_USER: sqlpage
      POSTGRES_PASSWORD: sqlpage
      POSTGRES_DB: sqlpage
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sqlpage"]
      interval: 2s
      timeout: 5s
      retries: 5
    logging:
      driver: syslog
      options:
        syslog-address: "udp://localhost:1515"
        syslog-format: "rfc5424micro"
        tag: "postgres"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "1514:1514/udp"
      - "1515:1515/udp"
    depends_on:
      - tempo
      - postgres

  prometheus:
    image: prom/prometheus:v3.2.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-otlp-receiver
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

  tempo:
    image: grafana/tempo:2.6.1
    volumes:
      - ./tempo.yaml:/etc/tempo/config.yaml:ro
    command: ["-config.file=/etc/tempo/config.yaml"]

  loki:
    image: grafana/loki:3.4.1
    command: ["-config.file=/etc/loki/local-config.yaml"]

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/sqlpage/sqlpage-home.json
      - GF_NEWS_NEWS_FEED_ENABLED=false
    volumes:
      - ./grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./grafana/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./grafana:/etc/grafana/provisioning/dashboards/sqlpage:ro
    depends_on:
      - tempo
      - loki
      - prometheus
